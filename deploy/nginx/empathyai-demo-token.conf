# EmpathyAI controlled demo reverse proxy.
#
# Public demo access must be token-first:
# - The GitHub Pages landing page calls the Cloud Run launcher.
# - The launcher redirects users to /?demo_token=<signed-token>.
# - Streamlit validates the token through DEMO_TOKEN_SECRET.
#
# Keep Nginx Basic Auth out of this public server/location. If auth_basic is
# enabled here, browsers on phones/tablets will be challenged for username and
# password before Streamlit can read and validate the demo_token.

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80;
    server_name _;

    # Serve the friendly timeout page outside Streamlit so expired sessions can
    # release Streamlit WebSocket connections and help VM idle shutdown work.
    location = /session-expired.html {
        root /var/www/empathyai;
        add_header Cache-Control "no-store";
        try_files /session-expired.html =404;
    }

    # Public tokenized Streamlit route. Authentication is handled by the app via
    # DEMO_TOKEN_SECRET, not by Nginx Basic Auth.
    location / {
        auth_basic off;

        proxy_pass http://127.0.0.1:8501;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }
}
